    <script>
    /* ============================ AUDIO ENGINE (EVOLVE / English A1) ============================ */
    let speechVoices = [];
    const synth = window.speechSynthesis || null;
    function loadVoices() {
        if (synth)
            speechVoices = synth.getVoices();
    }
    loadVoices();
    if (synth && synth.onvoiceschanged !== undefined) {
        synth.onvoiceschanged = loadVoices;
    }
    let bestVoice = null;
    function pickBestVoice() {
        if (!synth)
            return null;
        if (!speechVoices.length)
            speechVoices = synth.getVoices();
        const en = speechVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
        if (!en.length)
            return null;
        const pref = /Natural|Neural|Premium|Enhanced|Google US English|Google UK English|Samantha|Aaron|Ava|Allison|Evan|Jenny|Aria|Guy|Zira|Microsoft/i;
        return en.find(v => pref.test(v.name) && /en-US/i.test(v.lang)) || en.find(v => pref.test(v.name)) || en.find(v => /en-US/i.test(v.lang)) || en[0];
    }
    function cleanForSpeech(text) {
        return (text || '')
        .replace(/<[^>]+>/g, ' ')
        .replace(/\([^)]*\)/g, ' ')
        .replace(/\s*\/\s*/g, ', ')
        .replace(/ - | – | — /g, '. ')
        .replace(/\.\.\./g, '. ')
        .replace(/&quot;/g, ' ')
        .replace(/\b([A-Z])\b/g, function(m, c) {
            return c.toLowerCase();
        })
        .replace(/\s+/g, ' ').trim();
    }
    const isMobileDevice = /Android|iPhone|iPad|iPod|Mobile|IEMobile|BlackBerry|Opera Mini/i.test(navigator.userAgent || '')
    || (typeof navigator.maxTouchPoints === 'number' && navigator.maxTouchPoints > 1 && /Mac/.test(navigator.platform || ''));
    function chunkText(t, max) {
        max = max || 180;
        const words = String(t).split(' ');
        const out = [];
        let cur = '';
        for (const w of words) {
            if ((cur + ' ' + w).trim().length > max) {
                if (cur)
                    out.push(cur.trim());
                cur = w;
            } else {
                cur = (cur ? cur + ' ' : '') + w;
            }
        }
        if (cur.trim())
            out.push(cur.trim());
        return out.length ? out : [String(t)];
    }
    function speakDevice(clean) {
        if (!synth)
            return false;
        try {
            synth.cancel();
            if (!bestVoice)
                bestVoice = pickBestVoice();
            chunkText(clean, 160).forEach(function(part) {
                const u = new SpeechSynthesisUtterance(part);
                u.lang = 'en-US';
                u.rate = 0.95;
                u.pitch = 1.0;
                u.volume = 1;
                if (bestVoice)
                    u.voice = bestVoice;
                synth.speak(u);
            });
            return true;
        } catch (e) {
            return false;
        }
    }
    function ttsUrl(provider, txt) {
        const q = encodeURIComponent(txt);
        if (provider === 0)
            return 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q=' + q;
        return 'https://api.streamelements.com/kb/v2/speech?voice=Brian&text=' + q;
    }
    let _audio = null;
    let _token = 0;
    function stopAudio() {
        _token++;
        try {
            if (_audio) {
                _audio.onerror = null;
                _audio.onended = null;
                _audio.oncanplay = null;
                _audio.pause();
                _audio.src = '';
                _audio = null;
            }
        } catch (e) {}
        try {
            if (synth)
                synth.cancel();
        } catch (e) {}
    }
    function cloudThenDevice(clean) {
        const myToken = _token;
        const chunks = chunkText(clean, 190);
        let idx = 0,
            fellBack = false;
        function fallbackAll() {
            if (myToken !== _token || fellBack)
                return;
            fellBack = true;
            speakDevice(clean);
        }
        function playChunk() {
            if (myToken !== _token || idx >= chunks.length)
                return;
            const txt = chunks[idx];
            let provider = 0;
            (function tryProvider() {
                if (myToken !== _token)
                    return;
                let started = false,
                    done = false;
                const a = new Audio();
                _audio = a;
                a.preload = 'auto';
                const guard = setTimeout(function() {
                    if (!started && !done) {
                        done = true;
                        nextOrFallback();
                    }
                }, 1300);
                a.oncanplay = function() {
                    started = true;
                    clearTimeout(guard);
                };
                a.onended = function() {
                    if (myToken !== _token)
                        return;
                    clearTimeout(guard);
                    idx++;
                    playChunk();
                };
                a.onerror = function() {
                    if (done)
                        return;
                    done = true;
                    clearTimeout(guard);
                    nextOrFallback();
                };
                function nextOrFallback() {
                    if (myToken !== _token)
                        return;
                    provider++;
                    if (provider <= 1)
                        tryProvider();
                    else
                        fallbackAll();
                }
                try {
                    a.src = ttsUrl(provider, txt);
                    const p = a.play();
                    if (p && p.catch)
                        p.catch(function() {});
                }
                catch (e) {
                    if (!done) {
                        done = true;
                        clearTimeout(guard);
                        nextOrFallback();
                    }
                }
            })();
        }
        playChunk();
    }
    window.playAudio = (text, event) => {
        if (event) {
            event.stopPropagation();
            event.preventDefault();
        }
        const clean = cleanForSpeech(text);
        if (!clean)
            return;
        stopAudio();
        if (isMobileDevice || !window.Audio) {
            speakDevice(clean);
            return;
        }
        cloudThenDevice(clean);
    };
    </script>

    <script>

    /* lesson: {id,name, vocab:[[en,pt]], adj:[[en,pt]], adv:[[en,pt]], verbs:[[base,past,pp,pt]], expr:[[en,pt]], gr:[{...}], ph:[[en,pt]], gq:[{q,opts,a,why}], cp:[{...}]} */
    var COURSE = {
        units: [
        /* ====================== UNIT 1 ====================== */
        {
            n: 1,
            c: 1,
            title: "Unit 1 — People & First Impressions",
            lessons: [
            {

        function render() {

        /* ============================ PRACTICE ENGINE ============================ */
        var HEARTS = 10;
        var P = {
            activities: [],
            idx: 0,
            hearts: HEARTS,
            type: null,
            sel: null,
            matchSel: [],
            memSel: [],
            memMatched: 0,
            memTotal: 0,
            checking: false
        };
        function cleanWord(s) {
            return s.replace(/\([^)]*\)/g, '').trim();
        }
        function wordsOK(en) {
            var n = String(en).replace(/[.?!]$/, '').split(/\s+/).length;
            return n >= 3 && n <= 10;
        }
        function distract(pool, key, val, n) {
            return sample(pool.filter(function(x) {
                return String(x[key]).toLowerCase() !== String(val).toLowerCase();
            }), n).map(function(x) {
                return x[key];
            });
        }
        function buildPool(u) {
            var raw = [];
            ['nouns', 'adjectives', 'verbs', 'adverbs', 'expressions'].forEach(function(k) {
                (u.content[k] || []).forEach(function(it) {
                    raw.push(it);
                });
            });
            var pool = [],
                seen = {};
            raw.forEach(function(it) {
                var en = cleanWord(String(it.en).split('/')[0]).replace(/^to /, '');
                var pt = cleanWord(String(it.pt).split(/[\/(,]/)[0]);
                if (en && pt && en.length > 1 && en.split(' ').length <= 3 && !seen[en.toLowerCase()]) {
                    seen[en.toLowerCase()] = 1;
                    pool.push({
                        en: en,
                        pt: pt
                    });
                }
            });
            return pool;
        }
        function genActivities(U, L) {
            /* pools: lesson primeiro, com apoio do contexto da unidade inteira */
            var vocab = buildPool(L);
            var unitVocab = [],
                seen = {};
            (U.lessons || [L]).forEach(function(LL) {
                buildPool(LL).forEach(function(it) {
                    var k = it.en.toLowerCase();
                    if (!seen[k]) {
                        seen[k] = 1;
                        unitVocab.push(it);
                    }
                });
            });
            if (unitVocab.length < 4)
                unitVocab = vocab.slice();
            var dpool = unitVocab.length >= 6 ? unitVocab : vocab;
            var phrases = (L.phrases || []).filter(function(p) {
                return wordsOK(p.en);
            });
            var unitPhrases = [];
            (U.lessons || [L]).forEach(function(LL) {
                (LL.phrases || []).forEach(function(p) {
                    if (wordsOK(p.en))
                        unitPhrases.push(p);
                });
            });
            var allPhrases = phrases.length ? phrases.concat(unitPhrases.filter(function(p) {
                return phrases.indexOf(p) < 0;
            })) : unitPhrases;
            var comp = (L.comprehension && L.comprehension.length) ? L.comprehension : [];
            if (!comp.length) {
                for (var i = 0; i < (U.lessons || []).length; i++) {
                    if (U.lessons[i].comprehension && U.lessons[i].comprehension.length) {
                        comp = U.lessons[i].comprehension;
                        break;
                    }
                }
            }
            var gq = (L.gquiz && L.gquiz.length) ? L.gquiz.slice() : [];
            (U.lessons || []).forEach(function(LL) {
                if (LL !== L)
                    (LL.gquiz || []).forEach(function(q) {
                        gq.push(q);
                    });
            });

            /* ---- buckets por tipo ---- */
            var B = {
                ctx: [],
                listen: [],
                dict: [],
                fill: [],
                order: [],
                write: [],
                choose: [],
                grammar: [],
                match: [],
                mem: [],
                conj: []
            };

            // CONTEXTO (áudio/texto + pergunta) — estilo prova de proficiência
            shuffle(comp).forEach(function(c) {
                (c.questions || []).forEach(function(q) {
                    B.ctx.push({
                        type: 'context',
                        ctype: c.type,
                        title: c.title,
                        text: c.text,
                        lines: c.lines,
                        q: q.q,
                        options: q.opts.slice(),
                        answerIdx: q.a
                    });
                });
            });

            // OUVIR e escolher (áudio)
            sample(vocab, 4).forEach(function(it) {
                var opts = [it.en].concat(distract(dpool, 'en', it.en, 3));
                B.listen.push({
                    type: 'listen',
                    item: it,
                    options: shuffle(opts)
                });
            });

            // DITADO: ouvir a frase e escrever (áudio + escrita)
            sample(allPhrases, 3).forEach(function(p) {
                B.dict.push({
                    type: 'typeHear',
                    text: p.en.replace(/[.?!]$/, ''),
                    pt: p.pt
                });
            });

            // COMPLETAR a frase (contexto)
            sample(allPhrases, 3).forEach(function(p) {
                var words = p.en.replace(/[.?!]$/, '').split(/\s+/).filter(Boolean);
                if (words.length < 3)
                    return;
                var gi = 1 + Math.floor(Math.random() * (words.length - 1));
                var correct = words[gi].replace(/[^A-Za-z']/g, '');
                if (!correct)
                    return;
                var opts = [correct].concat(distract(dpool, 'en', correct, 3).map(function(w) {
                    return w.split(/\s+/)[0];
                }));
                B.fill.push({
                    type: 'fillBlank',
                    pt: p.pt,
                    words: words,
                    gapIndex: gi,
                    answer: correct,
                    options: shuffle(opts)
                });
            });

            // ORDENAR palavras para montar a frase
            sample(allPhrases, 4).forEach(function(p) {
                var answer = p.en.replace(/[.?!]$/, '').split(/\s+/).filter(Boolean);
                var dist = distract(dpool, 'en', answer.join(' '), 3).map(function(w) {
                    return w.split(/\s+/)[0];
                });
                B.order.push({
                    type: 'translateEn',
                    en: p.en.replace(/[.?!]$/, ''),
                    pt: p.pt,
                    answer: answer,
                    pool: shuffle(answer.concat(dist))
                });
            });

            // ESCREVER a frase inteira em inglês (produção livre)
            sample(allPhrases, 3).forEach(function(p) {
                B.write.push({
                    type: 'writeSentence',
                    en: p.en.replace(/[.?!]$/, ''),
                    pt: p.pt
                });
            });

            // VOCABULÁRIO em contexto (pt->en e en->pt)
            sample(vocab, 2).forEach(function(it) {
                B.choose.push({
                    type: 'choosePt',
                    item: it,
                    options: shuffle([it.pt].concat(distract(dpool, 'pt', it.pt, 3)))
                });
            });
            sample(vocab, 2).forEach(function(it) {
                B.choose.push({
                    type: 'chooseEn',
                    item: it,
                    options: shuffle([it.en].concat(distract(dpool, 'en', it.en, 3)))
                });
            });

            // GRAMÁTICA em contexto
            sample(gq, 4).forEach(function(q) {
                B.grammar.push({
                    type: 'grammarMC',
                    q: q.q,
                    options: q.opts.slice(),
                    answerIdx: q.a,
                    why: q.why
                });
            });

            // ASSOCIAR / MEMÓRIA
            if (vocab.length >= 4)
                B.match.push({
                    type: 'match',
                    pairs: sample(vocab, Math.min(4, vocab.length))
                });
            if (vocab.length >= 6)
                B.mem.push({
                    type: 'memory',
                    pairs: sample(vocab, 3)
                });

            // CONJUGAÇÃO de UMA forma específica — raro (no máx. 1, ~35% das vezes)
            if (Math.random() < 0.35) {
                var irr = (L.content.verbs || []).filter(function(v) {
                    var b = v.en.replace(/^to /, '');
                    return v.past !== b || v.pp !== b;
                });
                var vv = (irr.length ? irr : (L.content.verbs || []));
                if (vv.length) {
                    var v = sample(vv, 1)[0];
                    var form = Math.random() < 0.6 ? 'past' : 'pp';
                    B.conj.push({
                        type: 'conj',
                        base: v.en.replace(/^to /, ''),
                        pt: v.pt,
                        form: form,
                        answer: (form === 'past' ? v.past : v.pp)
                    });
                }
            }

            /* ---- sequência: começa com áudio/texto e intercala os tipos ---- */
            var plan = ['ctx', 'listen', 'dict', 'order', 'grammar', 'fill', 'ctx', 'write', 'listen', 'choose', 'order', 'dict', 'grammar', 'fill', 'write', 'choose', 'conj', 'listen', 'order', 'ctx', 'match', 'grammar', 'mem', 'write'];
            var acts = [];
            plan.forEach(function(name) {
                if (B[name] && B[name].length)
                    acts.push(B[name].shift());
            });
            // anexa o que sobrou, intercalando, p/ aproveitar todo o conteúdo
            var rest = [];
            Object.keys(B).forEach(function(k) {
                B[k].forEach(function(a) {
                    rest.push(a);
                });
            });
            acts = acts.concat(shuffle(rest));
            return acts.slice(0, 20);
        }
        function startPractice(unitIdx, lessonIdx) {

            b.innerHTML = '<button onclick="window.playAudio(\'' + jsq(a.text) + '\', event)" class="w-24 h-24 rounded-[2rem] flex items-center justify-center bg-gradient-to-tr from-[#0066cc] to-[#3388ff] text-white shadow-lg hover:scale-105 active:scale-95 transition-all"><i data-lucide="volume-2" class="w-10 h-10"></i></button>' +
            '<p class="text-sm text-slate-500 font-medium">Ouça e escreva a frase em inglês</p>';
            var w = document.createElement('div');
            w.className = 'w-full max-w-lg';
            w.innerHTML = '<input id="typeInput" type="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Type what you hear..." class="w-full px-5 py-4 text-lg md:text-xl font-bold text-center text-[#1d1d1f] bg-white/85 border border-white rounded-2xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#0066cc]/40">';
            b.appendChild(w);
            box.appendChild(b);
            var inp = w.querySelector('#typeInput');
            inp.addEventListener('input', function() {
                enableCheck(inp.value.trim().length > 0);
            });
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    var x = document.getElementById('btnCheck');
                    if (!x.disabled)
                        checkAnswer();
                }
            });
            setTimeout(function() {
                try {
                    inp.focus();
                } catch (e) {}
            }, 150);
            enableCheck(false);
            setTimeout(function() {
                window.playAudio(a.text);
            }, 120);
        }
        function renderWriteSentence(a, box) {
            var b = document.createElement('div');
            b.className = 'w-full max-w-xl mx-auto flex flex-col items-center gap-6 mt-2';
            b.innerHTML = '<div class="w-full p-6 md:p-7 bg-white/60 border border-white/80 rounded-[2rem] text-center"><p class="text-[10px] uppercase tracking-widest text-[#86868b] font-bold mb-1">Escreva em inglês</p><div class="text-xl md:text-2xl font-extrabold text-[#1d1d1f] leading-snug">' + esc(a.pt) + '</div></div><p class="text-sm text-slate-500 font-medium">Escreva a frase completa</p>';
            var w = document.createElement('div');
            w.className = 'w-full max-w-lg';
            w.innerHTML = '<textarea id="typeInput" rows="2" autocomplete="off" autocapitalize="sentences" spellcheck="false" placeholder="Write the full sentence in English..." class="w-full px-5 py-4 text-lg font-bold text-center text-[#1d1d1f] bg-white/85 border border-white rounded-2xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#0066cc]/40 resize-none"></textarea>';
            b.appendChild(w);
            box.appendChild(b);
            var inp = w.querySelector('#typeInput');
            inp.addEventListener('input', function() {
                enableCheck(inp.value.trim().length > 0);
            });
            inp.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    var x = document.getElementById('btnCheck');
                    if (!x.disabled)
                        checkAnswer();
                }
            });
            setTimeout(function() {
                try {
                    inp.focus();
                } catch (e) {}
            }, 150);
            enableCheck(false);
        }
        function renderTranslate(a, box) {
            var pb = document.createElement('div');
            pb.className = 'w-full max-w-2xl mx-auto p-5 md:p-6 bg-white/60 border border-white/80 rounded-[2rem] mb-8 text-center';
            pb.innerHTML = '<p class="text-[10px] uppercase tracking-widest text-[#86868b] font-bold mb-1">Em português</p><div class="text-xl md:text-2xl font-extrabold text-[#1d1d1f]">' + esc(a.pt) + '</div>';
            box.appendChild(pb);
            var drop = document.createElement('div');
            drop.id = 'dropZone';
            drop.className = 'drop-zone flex flex-wrap gap-2 w-full max-w-2xl mx-auto mb-10 justify-center';
            box.appendChild(drop);
            var pool = document.createElement('div');
            pool.className = 'flex flex-wrap justify-center gap-2.5 w-full max-w-2xl mx-auto';
            a.pool.forEach(function(word, i) {
                var btn = document.createElement('button');
                btn.className = 'word-block rounded-xl py-2.5 px-5 text-base md:text-lg font-bold text-slate-700';
                btn.innerText = word;
                btn.onclick = function() {
                    if (P.checking)
                        return;
                    var clone = document.createElement('button');
                    clone.className = 'word-block rounded-xl py-2.5 px-5 text-base md:text-lg font-bold text-slate-700';
                    clone.innerText = word;
                    clone.onclick = function() {
                        if (P.checking)
                            return;
                        clone.remove();
                        btn.classList.remove('used');
                        enableCheck(drop.children.length > 0);
                    };
                    drop.appendChild(clone);
                    btn.classList.add('used');
                    window.playAudio(word);
                    enableCheck(true);
                };
                pool.appendChild(btn);
            });
            box.appendChild(pool);
            enableCheck(false);
        }
        function renderFill(a, box) {
            var s = a.words.map(function(w, i) {
                return i === a.gapIndex ? '<span id="gapSlot" class="inline-block min-w-[70px] px-3 py-1 mx-1 border-b-2 border-dashed border-[#0066cc] text-[#0066cc]">_____</span>' : '<span>' + esc(w) + '</span>';
            }).join(' ');
            var d = document.createElement('div');
            d.className = 'w-full max-w-2xl mx-auto p-6 md:p-8 bg-white/60 border border-white/80 rounded-[2rem] mb-8 text-center';
            d.innerHTML = '<p class="text-[10px] uppercase tracking-widest text-[#86868b] font-bold mb-3">' + esc(a.pt) + '</p><div class="text-xl md:text-2xl font-extrabold text-[#1d1d1f] leading-relaxed">' + s + '</div>';
            box.appendChild(d);
            var g = document.createElement('div');
            g.className = 'grid grid-cols-2 gap-3 w-full max-w-xl mx-auto';
            a.options.forEach(function(opt) {
                var b = document.createElement('button');
                b.className = 'practice-card w-full text-center p-4 rounded-2xl text-base md:text-lg text-slate-700 font-bold';
                b.innerText = opt;
                b.onclick = function() {
                    if (P.checking)
                        return;
                    Array.prototype.forEach.call(g.children, function(c) {
                        c.classList.remove('selected');
                    });
                    b.classList.add('selected');
                    P.sel = opt;
                    var sl = document.getElementById('gapSlot');
                    if (sl)
                        sl.innerText = opt;
                    window.playAudio(opt);
                    enableCheck(true);
                };
                g.appendChild(b);
            });
            box.appendChild(g);
        }
        function renderMatch(a, box) {
            P.matchSel = [];
            var grid = document.createElement('div');
            grid.className = 'grid grid-cols-2 gap-3 md:gap-4 w-full max-w-lg mx-auto';
            var cards = [];
            a.pairs.forEach(function(p, i) {
                cards.push({
                    t: p.en,
                    lang: 'en',
                    id: i
                });
                cards.push({
                    t: cleanWord(p.pt),
                    lang: 'pt',
                    id: i
                });
            });
            shuffle(cards).forEach(function(card) {
                var b = document.createElement('button');
                b.className = 'practice-card rounded-2xl p-3 md:p-5 text-center text-sm md:text-lg font-bold text-slate-700 h-20 md:h-28 flex items-center justify-center';
                b.innerText = card.t;
                b.onclick = function() {
                    matchClick(b, card);
                };
                grid.appendChild(b);
            });
            box.appendChild(grid);
            enableCheck(false);
        }
        function matchClick(b, card) {
            if (P.checking || b.classList.contains('matched') || b.classList.contains('selected'))
                return;
            b.classList.add('selected');
            if (card.lang === 'en')
                window.playAudio(card.t);
            P.matchSel.push({
                el: b,
                d: card
            });
            if (P.matchSel.length === 2) {
                P.checking = true;
                var f = P.matchSel[0],
                    s = P.matchSel[1];
                if (f.d.id === s.d.id && f.d.lang !== s.d.lang) {
                    setTimeout(function() {
                        f.el.classList.add('matched');
                        s.el.classList.add('matched');
                        f.el.classList.remove('selected');
                        s.el.classList.remove('selected');
                        if (document.querySelectorAll('#activityContainer .practice-card:not(.matched)').length === 0) {
                            showFeedback(true);
                        } else {
                            P.checking = false;
                        }
                    }, 300);
                } else {
                    f.el.classList.add('error');
                    s.el.classList.add('error');
                    loseHeart();
                    setTimeout(function() {
                        f.el.classList.remove('error', 'selected');
                        s.el.classList.remove('error', 'selected');
                        P.checking = false;
                    }, 600);
                }
                P.matchSel = [];
            }
        }
        function renderMemory(a, box) {
            P.memSel = [];
            P.memMatched = 0;
            P.memTotal = a.pairs.length;
            var grid = document.createElement('div');
            grid.className = 'grid grid-cols-3 gap-3 md:gap-4 w-full max-w-xl mx-auto';
            var cards = [];
            a.pairs.forEach(function(p, i) {
                cards.push({
                    t: p.en,
                    lang: 'en',
                    id: i
                });
                cards.push({
                    t: cleanWord(p.pt),
                    lang: 'pt',
                    id: i
                });
            });
            shuffle(cards).forEach(function(card) {
                var w = document.createElement('div');
                w.className = 'mem-card';
                w.innerHTML = '<div class="mem-face mem-back"><i data-lucide="help-circle" class="w-7 h-7"></i></div><div class="mem-face mem-front">' + esc(card.t) + '</div>';
                w.onclick = function() {
                    memClick(w, card);
                };
                grid.appendChild(w);
            });
            box.appendChild(grid);
            enableCheck(false);
        }
        function memClick(w, card) {
            if (P.checking || w.classList.contains('done') || w.classList.contains('flipped'))
                return;
            w.classList.add('flipped');
            if (card.lang === 'en')
                window.playAudio(card.t);
            P.memSel.push({
                el: w,
                d: card
            });
            if (P.memSel.length === 2) {
                P.checking = true;
                var a = P.memSel[0],
                    b = P.memSel[1];
                if (a.d.id === b.d.id && a.d.lang !== b.d.lang) {
                    setTimeout(function() {
                        a.el.classList.add('done');
                        b.el.classList.add('done');
                        P.memMatched++;
                        if (P.memMatched >= P.memTotal) {
                            showFeedback(true);
                        } else {
                            P.checking = false;
                        }
                    }, 420);
                }
                else {
                    loseHeart();
                    setTimeout(function() {
                        a.el.classList.remove('flipped');
                        b.el.classList.remove('flipped');
                        P.checking = false;
                    }, 800);
                }
                P.memSel = [];
            }
        }
        function checkAnswer() {
            if (P.checking) {
                P.idx++;
                loadActivity();
                return;
            }
            var a = P.activities[P.idx];
            var ok = false,
                correct = '',
                audio = '';
            if (a.type === 'translateEn') {
                var uw = Array.prototype.map.call(document.getElementById('dropZone').children, function(b) {
                    return b.innerText.trim();
                });
                ok = uw.join(' ').toLowerCase() === a.answer.join(' ').toLowerCase();
                correct = a.en;
                audio = a.en;
            }
            else if (a.type === 'fillBlank') {
                ok = (P.sel || '').toLowerCase() === a.answer.toLowerCase();
                correct = a.words.join(' ');
                audio = a.words.join(' ');
            }
            else if (a.type === 'typeRead') {
                var v = (document.getElementById('typeInput') || {}).value || '';
                ok = normAns(v) === normAns(a.item.en);
                correct = a.item.en;
                audio = a.item.en;
            }
            else if (a.type === 'typeHear') {
                var vh = (document.getElementById('typeInput') || {}).value || '';
                ok = normAns(vh) === normAns(a.text);
                correct = a.text;
                audio = a.text;
            }
            else if (a.type === 'writeSentence') {
                var vs = (document.getElementById('typeInput') || {}).value || '';
                ok = normAns(vs) === normAns(a.en);
                correct = a.en;
                audio = a.en;
            }
            else if (a.type === 'conj') {
                var v2 = (document.getElementById('typeInput') || {}).value || '';
                var got = normAns(v2);
                var accepts = String(a.answer).split('/').map(function(s) {
                    return normAns(s);
                });
                ok = accepts.indexOf(got) >= 0;
                correct = (a.form === 'pp' ? 'particípio: ' : 'simple past: ') + a.answer;
                audio = a.answer.split('/')[0];
            }
            else if (a.type === 'chooseEn' || a.type === 'listen') {
                ok = P.sel === a.item.en;
                correct = a.item.en;
                audio = a.item.en;
            }
            else if (a.type === 'choosePt') {
                ok = P.sel === a.item.pt;
                correct = a.item.pt;
                audio = a.item.en;
            }
            else if (a.type === 'grammarMC') {
                ok = P.sel === a.options[a.answerIdx];
                correct = a.options[a.answerIdx] + (a.why ? ' — ' + a.why.replace(/<[^>]+>/g, '') : '');
                audio = a.options[a.answerIdx];
            }
            else if (a.type === 'context') {
                ok = P.sel === a.options[a.answerIdx];
                correct = a.options[a.answerIdx];
            }
            else if (a.type === 'match' || a.type === 'memory') {
                return;
            }
            P.checking = true;
            if (!ok)
                loseHeart();
            if (audio)
                window.playAudio(audio);
            showFeedback(ok, correct);
        }
        function skipActivity() {
            if (P.checking)
                return;
            P.checking = true;
            loseHeart();
            var a = P.activities[P.idx];
            var c = '';
            if (a.type === 'choosePt')
                c = a.item.pt;
            else if (a.type === 'conj')
                c = a.answer;
            else if (a.item)
                c = a.item.en;
            else if (a.en)
                c = a.en;
            else if (a.text)
                c = a.text;
            else if (a.options)
                c = a.options[a.answerIdx] || '';
            else if (a.words)
                c = a.words.join(' ');
            if (a.type === 'match' || a.type === 'memory')
                c = '—';
            showFeedback(false, c);
        }
        function loseHeart() {
            P.hearts--;
            document.getElementById('heartsCount').innerText = Math.max(0, P.hearts);
            if (P.hearts <= 0) {
                setTimeout(function() {
                    alert('Você ficou sem vidas! Tente novamente.');
                    P.idx = P.activities.length;
                    closePractice();
                }, 500);
            }
        }
        function showFeedback(ok, correct) {
            var fa = document.getElementById('feedbackArea'),
                ft = document.getElementById('feedbackTitle'),
                fx = document.getElementById('feedbackText'),
                fi = document.getElementById('feedbackIcon');
            var bc = document.getElementById('btnCheck'),
                bs = document.getElementById('btnSkip');
            bs.classList.add('hidden');
            bc.innerText = 'Continuar';
            bc.classList.remove('practice-btn-primary');
            bc.disabled = false;
            if (ok) {
                fa.className = 'absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up bg-teal-50/95 backdrop-blur-xl border-t border-teal-200 text-teal-900';
                fi.className = 'w-14 h-14 rounded-full flex items-center justify-center text-white bg-teal-500 shadow-md shrink-0';
                fi.innerHTML = '<i data-lucide="check" class="w-8 h-8"></i>';
                ft.innerText = ['Excelente!', 'Muito bem!', 'Perfeito!', 'Mandou bem!', 'Isso!'][Math.floor(Math.random() * 5)];
                fx.classList.add('hidden');
                bc.classList.add('practice-btn-success');
                bc.classList.remove('practice-btn-danger');
            } else {
                fa.className = 'absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up bg-rose-50/95 backdrop-blur-xl border-t border-rose-200 text-rose-900';
                fi.className = 'w-14 h-14 rounded-full flex items-center justify-center text-white bg-rose-500 shadow-md shrink-0';
                fi.innerHTML = '<i data-lucide="x" class="w-8 h-8"></i>';
                ft.innerText = 'Resposta correta:';
                fx.innerText = correct;
                fx.classList.remove('hidden');
                bc.classList.add('practice-btn-danger');
                bc.classList.remove('practice-btn-success');
            }
            fa.classList.remove('hidden');
            if (window.lucide)
                lucide.createIcons();
        }
        function resetFooter() {
            var fa = document.getElementById('feedbackArea'),
                bc = document.getElementById('btnCheck'),
                bs = document.getElementById('btnSkip');
            fa.classList.add('hidden');
            fa.className = 'hidden absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up';
            bs.classList.remove('hidden');
            bc.innerText = 'Verificar';
            bc.classList.remove('practice-btn-danger', 'practice-btn-success');
            bc.classList.add('practice-btn-primary');
            bc.onclick = checkAnswer;
            enableCheck(false);
        }
        function showVictory() {
            var box = document.getElementById('activityContainer');
            document.getElementById('activityTitle').innerText = '';
            document.getElementById('practiceProgress').style.width = '100%';
            document.getElementById('feedbackArea').classList.add('hidden');
            document.getElementById('btnSkip').classList.add('hidden');
            box.innerHTML = '<div class="flex flex-col items-center justify-center text-center mt-12"><div class="w-32 h-32 bg-gradient-to-tr from-amber-400 to-yellow-300 rounded-full flex items-center justify-center shadow-xl border-4 border-white mb-8"><i data-lucide="crown" class="w-16 h-16 text-white"></i></div><h2 class="text-3xl md:text-4xl font-extrabold text-[#1d1d1f] mb-3">Prática concluída!</h2><p class="text-[#86868b] text-lg font-bold uppercase tracking-widest">+10 XP</p></div>';
            if (window.lucide)
                lucide.createIcons();
            var bc = document.getElementById('btnCheck');
            bc.innerText = 'Concluir';
            bc.classList.add('practice-btn-success');
            bc.classList.remove('practice-btn-primary', 'practice-btn-danger');
            bc.disabled = false;
            bc.onclick = function() {
                closePractice();
                bc.onclick = checkAnswer;
            };
        }

        /* expose handlers used by inline onclick */
        window.goHome = goHome;
        window.goFolder = goFolder;
        window.openLesson = openLesson;
        window.setTab = setTab;
        window.toggleSidebar = toggleSidebar;
        window.toggleConj = toggleConj;
        window.startPractice = startPractice;
        window.closePractice = closePractice;
        window.checkAnswer = checkAnswer;
        window.skipActivity = skipActivity;

        render();
    })();
    </script>
</body>
</html>
